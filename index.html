<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
  <title>Hitster Bingo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="bg-[#0f0f17] min-h-screen flex flex-col items-center justify-start py-4 px-2">

  <!-- Header -->
  <header class="mb-4 text-center">
    <h1 class="text-4xl font-extrabold tracking-tight disco-gradient">Hitster Bingo</h1>
    <div class="mt-3 flex items-center justify-center gap-3">
      <button
        id="new-game-btn"
        class="px-6 py-3 rounded-full border-2 border-[#d4507a]/60 bg-[#1a1a28] text-white font-bold text-lg shadow-lg hover:border-[#d4507a] active:scale-95 transition-all"
      >
        🎲 Neues Spiel
      </button>
      <a
        href="https://0langa.github.io/Hitster-Bingo-Wheel/"
        target="_blank"
        rel="noopener noreferrer"
        class="px-4 py-2 rounded-full border border-[#4d9fd4]/50 bg-[#1a1a28] text-white font-semibold text-sm shadow-lg hover:border-[#4d9fd4] active:scale-95 transition-all"
      >
        🎡 Kategorie-Rad
      </a>
    </div>
  </header>

  <!-- 5×5 Bingo Grid -->
  <main class="w-full max-w-lg">
    <div
      id="bingo-grid"
      class="grid grid-cols-5 aspect-square gap-1 p-1 bg-[#12121e] rounded-xl shadow-2xl"
    >
      <!-- Cells injected by app.js -->
    </div>

    <!-- Scratchpad -->
    <div class="mt-4">
      <label for="scratchpad" class="block text-gray-400 text-sm font-semibold mb-1">
        Antwort für die Runde:
      </label>
      <textarea
        id="scratchpad"
        rows="1"
        autocomplete="off"
        placeholder="Hier tippen…"
        class="w-full rounded-lg bg-[#1a1a28] text-white placeholder-gray-600 px-3 py-2 text-base focus:outline-none focus:ring-2 focus:ring-[#d4507a]/60 border border-[#2a2a3a] resize-none overflow-hidden"
      ></textarea>
      <button
        id="clear-scratchpad-btn"
        class="mt-2 px-4 py-2 rounded-lg bg-[#1a1a28] border border-[#2a2a3a] text-gray-300 text-sm font-semibold hover:border-[#3a3a4a] active:scale-95 transition-all"
      >
        🗑️ Eingabe Löschen
      </button>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <script src="js/app.js"></script>

  <!-- Mode Selection Modal (populated by app.js) -->
  <div id="mode-modal" class="mode-modal-overlay hidden" role="dialog" aria-modal="true" aria-label="Spielmodus wählen">
    <div class="mode-modal">
      <h2 class="text-2xl font-extrabold text-center mb-5 disco-gradient">Spielmodus wählen</h2>
      <div id="mode-cards" class="flex flex-col sm:flex-row gap-4">
        <!-- Cards injected by app.js -->
      </div>
    </div>
  </div>
</body>
</html>
