<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
  <title>Hitster Bingo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="bg-gray-900 min-h-screen flex flex-col items-center justify-start py-4 px-2">

  <!-- Header -->
  <header class="mb-4 text-center">
    <h1 class="text-4xl font-extrabold tracking-tight disco-gradient">Hitster Bingo</h1>
    <button
      id="new-game-btn"
      class="mt-3 px-6 py-3 rounded-full bg-gradient-to-r from-pink-500 via-purple-500 to-indigo-500 text-white font-bold text-lg shadow-lg active:scale-95 transition-transform"
    >
      🎲 Neues Spiel
    </button>
  </header>

  <!-- 5×5 Bingo Grid -->
  <main class="w-full max-w-lg">
    <div
      id="bingo-grid"
      class="grid grid-cols-5 aspect-square gap-1 p-1 bg-gray-800 rounded-xl shadow-2xl"
    >
      <!-- Cells injected by app.js -->
    </div>

    <!-- Scratchpad -->
    <div class="mt-4">
      <label for="scratchpad" class="block text-gray-300 text-sm font-semibold mb-1">
        Antwort für die Runde:
      </label>
      <textarea
        id="scratchpad"
        rows="1"
        autocomplete="off"
        placeholder="Hier tippen…"
        class="w-full rounded-lg bg-gray-700 text-white placeholder-gray-500 px-3 py-2 text-base focus:outline-none focus:ring-2 focus:ring-purple-500 resize-none overflow-hidden"
      ></textarea>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
